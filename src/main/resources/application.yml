spring:
  application:
    name: expense-tracker-api
  profiles:
    active: dev

  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

server:
  port: 8080
  servlet:
    context-path: /api/v1

  logging:
    level:
      root: INFO


